name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore SipClient/SipClient.csproj

      - name: Build
        run: dotnet build SipClient/SipClient.csproj -c Release --no-restore

      - name: Publish
        run: >
          dotnet publish SipClient/SipClient.csproj -c Release -r win-x64
          --self-contained true -p:PublishSingleFile=true --no-build -o dist

      - name: Zip
        run: Compress-Archive -Path dist\* -DestinationPath SipClient-${{ github.ref_name }}-win-x64.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: SipClient-${{ github.ref_name }}-win-x64.zip
          generate_release_notes: true
